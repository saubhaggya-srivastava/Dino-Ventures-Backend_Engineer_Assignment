<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internal Wallet Service - Demo</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        color: white;
        margin-bottom: 30px;
      }

      .header h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      .header p {
        font-size: 1.1rem;
        opacity: 0.9;
      }

      .dashboard {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
      }

      .card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card h3 {
        color: #333;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .balance-grid {
        display: grid;
        gap: 15px;
      }

      .balance-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 10px;
        border-left: 4px solid #667eea;
      }

      .balance-label {
        font-weight: 600;
        color: #555;
      }

      .balance-amount {
        font-size: 1.2rem;
        font-weight: bold;
        color: #667eea;
      }

      .transaction-form {
        display: grid;
        gap: 15px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .form-group label {
        font-weight: 600;
        color: #555;
      }

      .form-group input,
      .form-group select {
        padding: 12px;
        border: 2px solid #e9ecef;
        border-radius: 8px;
        font-size: 1rem;
        transition: border-color 0.3s ease;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #667eea;
      }

      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-primary {
        background: #667eea;
        color: white;
      }

      .btn-primary:hover {
        background: #5a6fd8;
        transform: translateY(-2px);
      }

      .btn-success {
        background: #28a745;
        color: white;
      }

      .btn-warning {
        background: #ffc107;
        color: #212529;
      }

      .btn-danger {
        background: #dc3545;
        color: white;
      }

      .transaction-history {
        grid-column: 1 / -1;
      }

      .transaction-list {
        max-height: 400px;
        overflow-y: auto;
      }

      .transaction-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid #e9ecef;
        transition: background-color 0.3s ease;
      }

      .transaction-item:hover {
        background-color: #f8f9fa;
      }

      .transaction-info {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .transaction-type {
        font-weight: 600;
        text-transform: capitalize;
      }

      .transaction-details {
        font-size: 0.9rem;
        color: #666;
      }

      .transaction-amount {
        font-size: 1.1rem;
        font-weight: bold;
      }

      .amount-positive {
        color: #28a745;
      }

      .amount-negative {
        color: #dc3545;
      }

      .status-indicator {
        padding: 4px 8px;
        border-radius: 12px;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
      }

      .status-completed {
        background: #d4edda;
        color: #155724;
      }

      .status-pending {
        background: #fff3cd;
        color: #856404;
      }

      .alert {
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }

      .alert-success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .alert-error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .loading {
        display: none;
        text-align: center;
        padding: 20px;
      }

      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .account-selector {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .account-btn {
        padding: 8px 16px;
        border: 2px solid #667eea;
        background: white;
        color: #667eea;
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .account-btn.active {
        background: #667eea;
        color: white;
      }

      @media (max-width: 768px) {
        .dashboard {
          grid-template-columns: 1fr;
        }

        .header h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1><i class="fas fa-wallet"></i> Internal Wallet Service</h1>
        <p>
          Production-Grade Wallet Demo - Double-Entry Ledger with ACID
          Compliance
        </p>
      </div>

      <div class="alert alert-success" id="successAlert"></div>
      <div class="alert alert-error" id="errorAlert"></div>

      <div class="account-selector">
        <button
          class="account-btn active"
          onclick="selectAccount(3, 'user_001')"
        >
          User 001
        </button>
        <button class="account-btn" onclick="selectAccount(4, 'user_002')">
          User 002
        </button>
        <button class="account-btn" onclick="selectAccount(5, 'user_003')">
          User 003
        </button>
        <button class="account-btn" onclick="selectAccount(1, 'treasury')">
          Treasury
        </button>
      </div>

      <div class="dashboard">
        <div class="card">
          <h3><i class="fas fa-coins"></i> Account Balances</h3>
          <div class="loading" id="balanceLoading">
            <div class="spinner"></div>
            <p>Loading balances...</p>
          </div>
          <div class="balance-grid" id="balanceGrid">
            <!-- Balances will be loaded here -->
          </div>
          <button
            class="btn btn-primary"
            onclick="loadBalances()"
            style="margin-top: 15px"
          >
            <i class="fas fa-refresh"></i> Refresh Balances
          </button>
        </div>

        <div class="card">
          <h3><i class="fas fa-exchange-alt"></i> Execute Transaction</h3>
          <form class="transaction-form" onsubmit="executeTransaction(event)">
            <div class="form-group">
              <label for="transactionType">Transaction Type</label>
              <select id="transactionType" required>
                <option value="topup">Top-up (Add Credits)</option>
                <option value="spend">Spend (Use Credits)</option>
                <option value="bonus">Bonus (Free Credits)</option>
              </select>
            </div>

            <div class="form-group">
              <label for="assetType">Asset Type</label>
              <select id="assetType" required>
                <option value="gold_coins">Gold Coins</option>
                <option value="diamonds">Diamonds</option>
                <option value="loyalty_points">Loyalty Points</option>
              </select>
            </div>

            <div class="form-group">
              <label for="amount">Amount</label>
              <input
                type="number"
                id="amount"
                min="1"
                required
                placeholder="Enter amount"
              />
            </div>

            <div class="form-group">
              <label for="description">Description (Optional)</label>
              <input
                type="text"
                id="description"
                placeholder="Transaction description"
              />
            </div>

            <button type="submit" class="btn btn-primary">
              <i class="fas fa-paper-plane"></i> Execute Transaction
            </button>
          </form>
        </div>

        <div class="card transaction-history">
          <h3><i class="fas fa-history"></i> Recent Transactions</h3>
          <div class="loading" id="transactionLoading">
            <div class="spinner"></div>
            <p>Loading transactions...</p>
          </div>
          <div class="transaction-list" id="transactionList">
            <!-- Transactions will be loaded here -->
          </div>
          <button
            class="btn btn-primary"
            onclick="loadTransactions()"
            style="margin-top: 15px"
          >
            <i class="fas fa-refresh"></i> Refresh Transactions
          </button>
        </div>
      </div>
    </div>

    <script>
      let currentAccountId = 3;
      let currentAccountName = "user_001";
      const API_BASE = "http://localhost:8080/api/v1";

      // Initialize the demo
      document.addEventListener("DOMContentLoaded", function () {
        loadBalances();
        loadTransactions();
      });

      function selectAccount(accountId, accountName) {
        currentAccountId = accountId;
        currentAccountName = accountName;

        // Update active button
        document
          .querySelectorAll(".account-btn")
          .forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");

        // Reload data for new account
        loadBalances();
        loadTransactions();
      }

      async function loadBalances() {
        const loading = document.getElementById("balanceLoading");
        const grid = document.getElementById("balanceGrid");

        loading.style.display = "block";
        grid.innerHTML = "";

        try {
          const response = await fetch(
            `${API_BASE}/accounts/${currentAccountId}/balances`,
          );
          const data = await response.json();

          if (response.ok) {
            displayBalances(data.balances || []);
          } else {
            showError(`Failed to load balances: ${data.message}`);
          }
        } catch (error) {
          showError(`Network error: ${error.message}`);
        } finally {
          loading.style.display = "none";
        }
      }

      function displayBalances(balances) {
        const grid = document.getElementById("balanceGrid");

        if (balances.length === 0) {
          grid.innerHTML =
            '<p style="text-align: center; color: #666;">No balances found</p>';
          return;
        }

        const assetNames = {
          gold_coins: "Gold Coins",
          diamonds: "Diamonds",
          loyalty_points: "Loyalty Points",
        };

        const assetIcons = {
          gold_coins: "fas fa-coins",
          diamonds: "fas fa-gem",
          loyalty_points: "fas fa-star",
        };

        grid.innerHTML = balances
          .map(
            (balance) => `
                <div class="balance-item">
                    <div class="balance-label">
                        <i class="${assetIcons[balance.asset_type_id]}"></i>
                        ${assetNames[balance.asset_type_id]}
                    </div>
                    <div class="balance-amount">${balance.amount.toLocaleString()}</div>
                </div>
            `,
          )
          .join("");
      }

      async function executeTransaction(event) {
        event.preventDefault();

        const type = document.getElementById("transactionType").value;
        const assetType = document.getElementById("assetType").value;
        const amount = parseInt(document.getElementById("amount").value);
        const description = document.getElementById("description").value;

        // Determine from/to accounts based on transaction type
        let fromAccountId, toAccountId;

        if (type === "topup" || type === "bonus") {
          fromAccountId = 1; // Treasury
          toAccountId = currentAccountId;
        } else {
          // spend
          fromAccountId = currentAccountId;
          toAccountId = 2; // Revenue
        }

        const transactionData = {
          type: type,
          asset_type_id: assetType,
          amount: amount,
          from_account_id: fromAccountId,
          to_account_id: toAccountId,
          metadata: {
            description: description || `${type} transaction`,
            account_name: currentAccountName,
          },
        };

        try {
          const response = await fetch(`${API_BASE}/transactions`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Idempotency-Key": `demo-${Date.now()}-${Math.random()}`,
            },
            body: JSON.stringify(transactionData),
          });

          const result = await response.json();

          if (response.ok) {
            showSuccess(
              `Transaction executed successfully! ID: ${result.transaction_id}`,
            );
            document.querySelector(".transaction-form").reset();

            // Refresh data
            setTimeout(() => {
              loadBalances();
              loadTransactions();
            }, 500);
          } else {
            showError(`Transaction failed: ${result.message}`);
          }
        } catch (error) {
          showError(`Network error: ${error.message}`);
        }
      }

      async function loadTransactions() {
        const loading = document.getElementById("transactionLoading");
        const list = document.getElementById("transactionList");

        loading.style.display = "block";
        list.innerHTML = "";

        try {
          const response = await fetch(
            `${API_BASE}/accounts/${currentAccountId}/transactions?limit=10`,
          );
          const data = await response.json();

          if (response.ok) {
            displayTransactions(data.transactions || []);
          } else {
            showError(`Failed to load transactions: ${data.message}`);
          }
        } catch (error) {
          showError(`Network error: ${error.message}`);
        } finally {
          loading.style.display = "none";
        }
      }

      function displayTransactions(transactions) {
        const list = document.getElementById("transactionList");

        if (transactions.length === 0) {
          list.innerHTML =
            '<p style="text-align: center; color: #666; padding: 20px;">No transactions found</p>';
          return;
        }

        const assetNames = {
          gold_coins: "Gold Coins",
          diamonds: "Diamonds",
          loyalty_points: "Loyalty Points",
        };

        list.innerHTML = transactions
          .map((tx) => {
            const isIncoming = tx.to_account_id === currentAccountId;
            const amountClass = isIncoming
              ? "amount-positive"
              : "amount-negative";
            const amountPrefix = isIncoming ? "+" : "-";

            return `
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <div class="transaction-type">${tx.type}</div>
                            <div class="transaction-details">
                                ${assetNames[tx.asset_type_id]} • ${new Date(tx.created_at).toLocaleString()}
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div class="transaction-amount ${amountClass}">
                                ${amountPrefix}${tx.amount.toLocaleString()}
                            </div>
                            <div class="status-indicator status-${tx.status}">
                                ${tx.status}
                            </div>
                        </div>
                    </div>
                `;
          })
          .join("");
      }

      function showSuccess(message) {
        const alert = document.getElementById("successAlert");
        alert.textContent = message;
        alert.style.display = "block";
        setTimeout(() => (alert.style.display = "none"), 5000);
      }

      function showError(message) {
        const alert = document.getElementById("errorAlert");
        alert.textContent = message;
        alert.style.display = "block";
        setTimeout(() => (alert.style.display = "none"), 5000);
      }
    </script>
  </body>
</html>
